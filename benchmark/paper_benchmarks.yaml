# CoEval — Paper Validation Benchmark
# =============================================================================
# This config runs the full paper evaluation across 4 tasks × 4 public
# benchmarks. Phase 3 datapoints are sourced from the benchmark datasets
# (emit_datapoints.py must be run first to populate phase3_datapoints/).
#
# Rubrics are derived from the benchmark's official evaluation criteria
# (see Section 3.3.2 of the paper).
#
# Setup
# -----
#   1. Emit benchmark datapoints:
#        python -m benchmark.emit_datapoints --run-id paper-eval-v1 --sample-size 620
#
#   2. Run the experiment (phases 1-2 use Keep since rubrics are static below;
#      phase 3 uses Keep since datapoints are pre-emitted):
#        python -m experiments.cli run --config benchmark/paper_benchmarks.yaml
#
# =============================================================================


# ─── MODELS ──────────────────────────────────────────────────────────────────

models:

  # Judge / student models — all three frontier models as judges
  - name: gpt-4o
    interface: openai
    parameters:
      model: gpt-4o
      temperature: 0.7
      max_tokens: 512
    roles: [student, judge]
    role_parameters:
      student:
        temperature: 0.7
        max_tokens: 512
      judge:
        temperature: 0.0
        max_tokens: 256

  - name: gpt-4o-mini
    interface: openai
    parameters:
      model: gpt-4o-mini
      temperature: 0.7
      max_tokens: 512
    roles: [student, judge]
    role_parameters:
      student:
        temperature: 0.7
        max_tokens: 512
      judge:
        temperature: 0.0
        max_tokens: 256

  - name: gpt-3.5-turbo
    interface: openai
    parameters:
      model: gpt-3.5-turbo
      temperature: 0.7
      max_tokens: 512
    roles: [student]
    role_parameters:
      student:
        temperature: 0.7
        max_tokens: 512

  - name: claude-opus-4-6
    interface: anthropic
    parameters:
      model: claude-opus-4-6
      temperature: 0.7
      max_tokens: 512
    roles: [student, judge]
    role_parameters:
      student:
        temperature: 0.7
        max_tokens: 512
      judge:
        temperature: 0.0
        max_tokens: 256

  - name: claude-sonnet-4-6
    interface: anthropic
    parameters:
      model: claude-sonnet-4-6
      temperature: 0.7
      max_tokens: 512
    roles: [student]
    role_parameters:
      student:
        temperature: 0.7
        max_tokens: 512

  - name: qwen2p5-0b5
    interface: huggingface
    parameters:
      model: Qwen/Qwen2.5-0.5B-Instruct
      temperature: 0.7
      max_new_tokens: 512
      device: auto
    roles: [student]
    role_parameters:
      student:
        temperature: 0.7
        max_new_tokens: 512

  - name: qwen2p5-1b5
    interface: huggingface
    parameters:
      model: Qwen/Qwen2.5-1.5B-Instruct
      temperature: 0.7
      max_new_tokens: 512
      device: auto
    roles: [student]
    role_parameters:
      student:
        temperature: 0.7
        max_new_tokens: 512

  - name: smollm2-1b7
    interface: huggingface
    parameters:
      model: HuggingFaceTB/SmolLM2-1.7B-Instruct
      temperature: 0.7
      max_new_tokens: 512
      device: auto
    roles: [student]
    role_parameters:
      student:
        temperature: 0.7
        max_new_tokens: 512


# ─── TASKS ───────────────────────────────────────────────────────────────────

tasks:

  # ════════════════════════════════════════════════════════════════════════════
  # Task 1: Text Summarization (XSum benchmark)
  # Rubric factors derived from XSum / BERTScore evaluation criteria
  # Ground-truth metric: BERTScore-F1 vs. gold summary
  # ════════════════════════════════════════════════════════════════════════════
  - name: text_summarization
    description: >
      Summarise a BBC news article in one concise sentence. The summary must
      be faithful to the article, cover the key information, and be appropriately
      brief. Source benchmark: XSum (EdinburghNLP/xsum).
    output_description: >
      A single sentence (20-50 words) summarising the most important fact or
      event described in the article. No bullet points. No preamble.

    # Static attributes — inferred by benchmark loader, not generated by teachers
    target_attributes:
      complexity:   [simple, moderate, complex, technical]
      domain:       [science, business, politics, technology, health, other]

    nuanced_attributes: {}

    sampling:
      target: [1]
      nuance: [0]
      total: 620    # matches benchmark loader sample_size

    # Rubric grounded in XSum / BERTScore evaluation dimensions (Section 3.3.2)
    rubric:
      faithfulness:         "The summary contains no hallucinated or incorrect facts relative to the source article."
      information_coverage: "The summary captures the single most important fact or event from the article."
      conciseness:          "The summary is appropriately brief (one sentence) with no redundancy or filler."

    evaluation_mode: single

    # Phase 3: pre-emitted from XSum benchmark — no teacher generation
    prompt_library:
      sample: "{prompt}"

  # ════════════════════════════════════════════════════════════════════════════
  # Task 2: Code Explanation (CodeSearchNet benchmark)
  # Rubric factors derived from CodeSearchNet docstring quality evaluation
  # Ground-truth metric: BERTScore-F1 vs. reference docstring
  # ════════════════════════════════════════════════════════════════════════════
  - name: code_explanation
    description: >
      Explain what a given Python function does. The explanation should be
      suitable as a docstring: accurate, clear, and at the appropriate level of
      detail for the function's complexity. Source benchmark: CodeSearchNet.
    output_description: >
      A plain-English explanation (40-150 words) of what the function does,
      its parameters, return value, and any notable edge cases or algorithmic
      details. Written as if it were a docstring.

    target_attributes:
      complexity:    [beginner, intermediate, advanced]
      snippet_type:  [function, class_definition, algorithm, database_query]

    nuanced_attributes: {}

    sampling:
      target: [1]
      nuance: [0]
      total: 620

    # Rubric grounded in CodeSearchNet docstring quality dimensions (Section 3.3.2)
    rubric:
      technical_accuracy:   "All statements about what the code does are factually correct."
      explanation_clarity:  "The explanation is clearly written and avoids unnecessary jargon for the audience."
      completeness:         "The explanation covers what the function does, its inputs, and its output."
      appropriate_level:    "The depth and vocabulary match the function's actual complexity."
      edge_case_handling:   "Non-obvious behaviour, error conditions, or edge cases are noted where relevant."

    evaluation_mode: single

    prompt_library:
      sample: "{prompt}"

  # ════════════════════════════════════════════════════════════════════════════
  # Task 3: Email Composition (AESLC benchmark)
  # Rubric factors derived from professional email quality dimensions
  # Ground-truth metric: BERTScore-F1 vs. reference email
  # ════════════════════════════════════════════════════════════════════════════
  - name: email_composition
    description: >
      Write a professional workplace email matching the specified subject and
      context. The email must be clear, appropriately toned, and complete.
      Source benchmark: AESLC (Annotated Enron Subject Line Corpus).
    output_description: >
      A complete email including Subject line, greeting, body (1-3 paragraphs),
      and sign-off. Tone should be professional. Length should match the context.

    target_attributes:
      purpose:  [information_request, project_update, complaint_resolution, proposal, follow_up]
      length:   [brief, standard, detailed]

    nuanced_attributes: {}

    sampling:
      target: [1]
      nuance: [0]
      total: 620

    # Rubric grounded in professional email quality / BERTScore decomposition (Section 3.3.2)
    rubric:
      clarity:            "The email communicates its purpose unambiguously in the opening paragraph."
      appropriate_tone:   "The tone and formality are appropriate for a professional workplace context."
      completeness:       "All necessary information relevant to the specified purpose is included."
      professionalism:    "The email is grammatically correct and follows standard professional conventions."
      actionability:      "Where a response or action is needed, the request is specific and easy to act on."

    evaluation_mode: single

    prompt_library:
      sample: "{prompt}"

  # ════════════════════════════════════════════════════════════════════════════
  # Task 4: Data Interpretation (WikiTableQuestions benchmark)
  # Rubric factors derived from table QA evaluation dimensions
  # Ground-truth metric: Exact-match accuracy vs. gold answer
  # ════════════════════════════════════════════════════════════════════════════
  - name: data_interpretation
    description: >
      Answer a question about a data table by interpreting the table contents.
      The answer must be accurate, clearly stated, and appropriately concise.
      Source benchmark: WikiTableQuestions.
    output_description: >
      A direct answer to the question (1 sentence for factual questions;
      2-3 sentences for comparative or multi-step questions), referencing
      the relevant cells or patterns in the table.

    target_attributes:
      insight_depth:  [surface_observation, analytical_interpretation, predictive_inference]

    nuanced_attributes: {}

    sampling:
      target: [1]
      nuance: [0]
      total: 620

    # Rubric grounded in WikiTableQuestions / exact-match evaluation (Section 3.3.2)
    rubric:
      numerical_accuracy:      "Any numerical claims match the values in the table exactly."
      trend_identification:    "The answer correctly identifies the relevant row/column or pattern."
      insight_quality:         "The answer goes beyond stating the obvious; it interprets the data in context."
      appropriate_caveats:     "Ambiguities or table limitations are noted where relevant; claims are not overstated."
      clarity:                 "The answer is clearly stated and directly addresses the question asked."

    evaluation_mode: single

    prompt_library:
      sample: "{prompt}"


# ─── EXPERIMENT ──────────────────────────────────────────────────────────────

experiment:
  id: paper-eval-v1
  storage_folder: ./benchmark/runs
  log_level: INFO

  phases:
    # Phases 1-2: Keep — rubrics are static (defined above)
    # Phase 3: Keep — datapoints are pre-emitted by emit_datapoints.py
    attribute_mapping:   Keep
    rubric_mapping:      Keep
    data_generation:     Keep
    response_collection: New
    evaluation:          New
