# ─── Auto-routing table ───────────────────────────────────────────────────────────────────────────────
#
# Used by `interface: auto` in experiment configs.
# When a model has `interface: auto`, CoEval scans this list top-to-bottom,
# finds the first fragment that matches the model's `parameters.model` value,
# and uses the listed interface — provided that interface's credentials are
# available in keys.yaml.  Entries are ordered cheapest-first (with batch).
#
# Format:  model_fragment: {interface, notes}
#   model_fragment  — lowercase substring of the model's `parameters.model`
#   interface       — CoEval interface name to use
#   notes           — human-readable explanation
# ─────────────────────────────────────────────────────────────────────────────────

auto_routing:

  # ── OpenAI models ─────────────────────────────────────────────────────────────────────────
  # Cheapest via direct OpenAI API (50% batch discount available)
  gpt-4o-mini:   {interface: openai,     notes: "Direct OpenAI; batch 50% off → effective $0.075/$0.30"}
  gpt-4.1-nano:  {interface: openai,     notes: "Direct OpenAI; batch 50% off → effective $0.05/$0.20"}
  gpt-4.1-mini:  {interface: openai,     notes: "Direct OpenAI; batch 50% off → effective $0.20/$0.80"}
  gpt-4o:        {interface: openai,     notes: "Direct OpenAI; batch 50% off → effective $1.25/$5.00"}
  gpt-4.1:       {interface: openai,     notes: "Direct OpenAI; batch 50% off → effective $1.00/$4.00"}
  gpt-3.5-turbo: {interface: openai,     notes: "Direct OpenAI; batch 50% off → effective $0.25/$0.75"}
  o1-mini:       {interface: openai,     notes: "Direct OpenAI; batch 50% off"}
  o3-mini:       {interface: openai,     notes: "Direct OpenAI; batch 50% off"}
  o4-mini:       {interface: openai,     notes: "Direct OpenAI; batch 50% off"}
  o1:            {interface: openai,     notes: "Direct OpenAI; batch 50% off"}
  # ── Anthropic models ──────────────────────────────────────────────────────────────────────────
