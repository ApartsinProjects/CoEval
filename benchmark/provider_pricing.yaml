  amazon.nova-lite:  {interface: bedrock, notes: "AWS Bedrock → $0.06/$0.24"}
  amazon.nova-pro:   {interface: bedrock, notes: "AWS Bedrock → $0.80/$3.20"}
# ─── Suggested providers (not yet implemented as native CoEval interfaces) ──────
#
# WHY OpenRouter for open models (and not providers with batch discounts)?
# ─────────────────────────────────────────────────────────────────────────────────
# Batch discounts (OpenAI 50%, Anthropic 50%, Gemini 50%) are PROPRIETARY:
#   - OpenAI Batch API  → only works for GPT-4o, GPT-4o-mini, GPT-4.1, etc.
#   - Anthropic Batches → only works for Claude 3.5 / Claude 3 / Claude 4 models
#   - Gemini Batch API  → only works for Gemini 2.0 / 1.5 models
# For open-weight models (Llama, Mistral, DeepSeek, Qwen), NO hosting provider
# currently offers a batch discount. OpenRouter is the cheapest convenient gateway
# with the widest model selection ($0.04–$0.12/M input tokens for popular models).
#
# When to add a native interface instead of using OpenRouter:
#   1. The provider is consistently cheaper than OpenRouter for your target models
#   2. The provider offers unique features (e.g. Groq's extreme speed ~500 tok/s)
#   3. You want to avoid the small OpenRouter markup (~5-15%)
#
# Priority tiers for future implementation:
#   P1 — High priority  — unique capability or significantly cheaper
#   P2 — Medium priority — marginally cheaper, easy to add (OpenAI-compat API)
#   P3 — Low priority   — niche use case or similar price to OpenRouter
#
# ─────────────────────────────────────────────────────────────────────────────────────────────────────
# Provider      | Priority | Batch? | Notable models              | Input  | Output | Why add natively?
# ─────────────────────────────────────────────────────────────────────────────────────────────────────
# Groq          |    P1    |  No    | Llama-3.1-8B-Instant        | $0.05  | $0.08  | ~500 tok/s; 10-20x faster than OpenRouter
#               |          |        | Llama-3.3-70B               | $0.59  | $0.79  | ideal for Phase 4 latency-sensitive runs
#               |          |        | Mixtral-8x7B                | $0.24  | $0.24  | API: console.groq.com (OpenAI-compat)
#               |          |        | Gemma-2-9B-IT               | $0.20  | $0.20  |
# DeepSeek API  |    P1    |  No    | DeepSeek-V3                 | $0.07  | $0.28  | 2x cheaper than OpenRouter for V3
#  (direct)     |          |        | DeepSeek-R1                 | $0.55  | $2.19  | API: api.deepseek.com (OpenAI-compat)
# Mistral API   |    P2    |  No    | Mistral-Small-Latest        | $0.10  | $0.30  | Same price as OR; avoids markup + better SLAs
#  (direct)     |          |        | Mistral-Large-Latest        | $2.00  | $6.00  | API: api.mistral.ai (OpenAI-compat)
#               |          |        | Codestral (code tasks)      | $0.20  | $0.60  | Only on Mistral direct (not on OpenRouter)
# DeepInfra     |    P2    |  No    | Llama-3.3-70B               | $0.12  | $0.40  | Same as OR; more reliable SLAs
#               |          |        | DeepSeek-R1                 | $0.55  | $2.19  | API: api.deepinfra.com (OpenAI-compat)
#               |          |        | Qwen2.5-72B                 | $0.13  | $0.40  |
# Cerebras      |    P2    |  No    | Llama-3.1-8B                | $0.10  | $0.10  | Wafer-scale AI; 1000+ tok/s (latency)
#               |          |        | Llama-3.1-70B               | $0.60  | $0.60  | API: api.cerebras.ai (OpenAI-compat)
# Fireworks AI  |    P2    |  No    | Llama-3.3-70B-Instruct      | $0.20  | $0.20  | Flat output price; cheap for long outputs
#               |          |        | DeepSeek-V3                 | $0.50  | $1.50  | API: api.fireworks.ai (OpenAI-compat)
# Novita AI     |    P2    |  No    | Llama-3.3-70B               | $0.09  | $0.35  | Slightly cheaper than OpenRouter
#               |          |        | Qwen2.5-72B                 | $0.12  | $0.39  | API: api.novita.ai (OpenAI-compat)
# Cohere        |    P3    |  No    | Command-R                   | $0.15  | $0.60  | RAG-optimised; unique retrieval features
#               |          |        | Command-R+                  | $2.50  | $10.00 | API: api.cohere.com (native SDK)
# SambaNova     |    P3    |  No    | Llama-3.1-405B              | $5.00  | $10.00 | Fastest for >100B models
#               |          |        | Llama-3.1-70B               | $0.60  | $1.20  | API: api.sambanova.ai (OpenAI-compat)
# Together AI   |    P3    |  No    | Llama-3.3-70B               | $0.90  | $0.90  | Higher price than OR; decent ecosystem
#               |          |        | Qwen2.5-72B                 | $1.20  | $1.20  | API: api.together.xyz (OpenAI-compat)
# AI21 Labs     |    P3    |  No    | Jamba-1.5-Mini              | $0.20  | $0.40  | SSM-Transformer hybrid; long context
#               |          |        | Jamba-1.5-Large             | $2.00  | $8.00  | API: api.ai21.com (OpenAI-compat)
# Cloudflare    |    P3    |  No    | Llama-3-8B (Workers AI)     | $0.01  | $0.01  | Extremely cheap for small models only
#               |          |        | Mistral-7B                  | $0.01  | $0.01  | Serverless; only for quick/cheap eval
# ─────────────────────────────────────────────────────────────────────────────────────────────────────
#
# Implementation effort: ~2-4 hours per provider (all are OpenAI-compatible).
# Steps: new <provider>_iface.py → VALID_INTERFACES → pool.py → pricing block +
#        auto_routing entries → probe.py supported_providers list.
# For immediate access without new code: interface: openrouter routes to most
# of the above providers automatically.
