  gemini-2.5-flash-lite: {interface: gemini, notes: "Direct Gemini; batch 50% off → effective $0.0375/$0.15"}
  gemini-1.5-flash:      {interface: gemini, notes: "Direct Gemini; batch 50% off → effective $0.0375/$0.15"}
  gemini-2.0-flash:      {interface: gemini, notes: "Direct Gemini; batch 50% off → effective $0.05/$0.20"}
  gemini-2.5-flash:      {interface: gemini, notes: "Direct Gemini; batch 50% off → effective $0.075/$0.30"}
  gemini-1.5-pro:        {interface: gemini, notes: "Direct Gemini; batch 50% off → effective $0.625/$2.50"}
  gemini-2.5-pro:        {interface: gemini, notes: "Direct Gemini; batch 50% off → effective $0.625/$5.00"}
  # ── Llama models (open weights, cheapest via OpenRouter) ───────────────────────
  llama-3.1-8b:  {interface: openrouter, notes: "OpenRouter cheapest tier → $0.05/$0.08"}
  llama-3-8b:    {interface: openrouter, notes: "OpenRouter → $0.08/$0.08"}
