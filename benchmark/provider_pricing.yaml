# CoEval — Shared Provider Pricing Table
# ============================================================
# Single source of truth for all cost estimation across all
# CoEval experiments.  Updated: 2026-03-02.
#
# Prices are in USD per 1,000,000 (1M) tokens.
# batch_discount: multiplier applied when native batch API is used
#   (0.50 = 50% off, i.e. half price; 1.00 = no discount)
#
# auto_routing: ordered mapping of model-name fragments to the
#   cheapest available interface.  Used by `interface: auto` in
#   experiment YAML configs.  The first matching fragment whose
#   interface has credentials available is chosen.
# ============================================================

# ─── Provider catalogue ──────────────────────────────────────────────────────

