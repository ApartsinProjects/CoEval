# CoEval — SOTA LLM Model Catalogue
# =============================================================================
# A reference YAML listing 50+ state-of-the-art models across all supported
# CoEval interfaces (openai, anthropic, gemini, azure_openai, openrouter,
# bedrock, vertex, huggingface).
#
# USAGE
#   Copy the model blocks you need into your experiment YAML under `models:`.
#   Set the appropriate access_key or configure it in keys.yaml / env vars.
#
# INTERFACES SUMMARY
#   openai       — OpenAI API  (OPENAI_API_KEY)
#   anthropic    — Anthropic API  (ANTHROPIC_API_KEY)
#   gemini       — Google AI Studio  (GEMINI_API_KEY or GOOGLE_API_KEY)
#   azure_openai — Azure AI Foundry  (keys.yaml: azure_openai block)
#   openrouter   — OpenRouter  (OPENROUTER_API_KEY)  model IDs: provider/name
#   bedrock      — AWS Bedrock  (keys.yaml: bedrock block or IAM env vars)
#   vertex       — Google Vertex AI  (keys.yaml: vertex block + ADC)
#   huggingface  — Local HF models  (GPU required; HF_TOKEN)
#
# NOTE: model availability and pricing change frequently.
#       Verify current model IDs and pricing at each provider before use.
# =============================================================================

models:

  # ===========================================================================
  # OPENAI
  # ===========================================================================

  # ---------------------------------------------------------------------------
  # GPT-4o (flagship multimodal, April 2024)
  # ---------------------------------------------------------------------------
  - name: gpt-4o
    interface: openai
    parameters:
      model: gpt-4o
      temperature: 0.7
      max_tokens: 1024
    roles: [teacher, student, judge]
    role_parameters:
      teacher:  {temperature: 0.8, max_tokens: 1024}
      student:  {temperature: 0.7, max_tokens: 512}
      judge:    {temperature: 0.0, max_tokens: 256}

  # ---------------------------------------------------------------------------
  # GPT-4o mini (cheap, fast, June 2024)
