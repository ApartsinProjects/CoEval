# CoEval — Dual-Track Paper Validation Experiment
# =============================================================================
# Compares student model rankings on two data sources for the same tasks:
#
#   Track A (Benchmark):  Phase 3 datapoints pre-emitted from real benchmark
#                         datasets (XSum, CodeSearchNet, AESLC, WikiTableQs).
#                         Teachers = xsum, codesearchnet-python, aeslc,
#                         wikitablequestions (virtual; no API calls).
#
#   Track B (Synthetic):  Phase 3 datapoints generated by two representative
#                         teachers (GPT-4o = strong, Llama-3.3-70B = open).
#
# Having multiple teachers lets us compute Kendall τ between rankings
# obtained from benchmark-sourced vs. synthetic data, cross-validating
# CoEval's stability (paper §4.3).
#
# Model design
# ─# ─# ─# ─# ─# ─
#   • 10 SOTA models, API-only (no local GPU required)
#   • 5 frontier API models play ALL THREE roles (teacher + student + judge)
#   • 5 open models via OpenRouter play student (+ Llama 70B plays teacher)
#   • Batch API enabled for OpenAI, Anthropic, and Gemini → 50% cost reduction
#
# Rubric design
# ─# ─# ─# ─# ─# ─# ─
#   Each task rubric includes one dimension that mechanistically aligns with
#   the benchmark's native metric (benchmark-aligned dimension, marked [BA]):
#     text_summarization  → faithfulness      [BA: BERTScore-F1]
#     code_explanation    → technical_accuracy [BA: BERTScore vs docstring]
#     email_composition   → content_fidelity  [BA: BERTScore-F1]
#     data_interpretation → numerical_accuracy [BA: exact-match accuracy]
#
# Cost estimate (100 items/task, 4 tasks = 400 total, batch pricing)
# ═══════════════════════════════════════════════════════════════════
#   Phase 3 (synthetic):  3 teachers × 400 items           ≈  $2
#   Phase 4 (responses): 10 students × 3 teachers × 400    ≈ $18
#   Phase 5 (evaluation): 3 judges × 10s × 3t × 400        ≈ $22
#   Total estimated                                         ≈ $42
#
# Setup
# ─# ─# ─
#   1. Emit benchmark datapoints (Track A):
#        python -m benchmark.emit_datapoints \\
#            --run-id paper-dual-track-v1 --sample-size 100
#
#   2. Run the experiment:
#        coeval run --config benchmark/paper_dual_track.yaml
#
#   3. Compute benchmark-native scores (post-run):
#        python -m benchmark.compute_scores \\
#            --run benchmark/runs/paper-dual-track-v1
#
#   4. Run baseline comparison (for Table 3):
#        python -m benchmark.run_baselines \\
#            --run benchmark/runs/paper-dual-track-v1 \\
#            --out paper/tables --max-pairs 200
#
#   5. Generate paper tables:
#        python -m analysis.paper_tables \\
#            --run benchmark/runs/paper-dual-track-v1 --out paper/tables
# =============================================================================


# ─── MODELS ────────────────────────────────────────────────────────────────
#
# Role legend:
#   teacher  — generates Phase 3 (prompt, reference) pairs [synthetic track]
#   student  — receives Phase 3 prompts and produces responses
#   judge    — scores student responses against the rubric
#
# 5 frontier API models play ALL roles.
# 5 open models (via OpenRouter) play student; Llama-70B also plays teacher.
# xsum, codesearchnet-python, aeslc, wikitablequestions (virtual) are teachers
# for Track A (no API calls).

models:

  # ── Track A teachers (virtual — no API calls) ────────────────────────
  - name: xsum
    interface: benchmark
    parameters:
      description: "XSum BBC news article summarisation benchmark (EdinburghNLP/xsum)"
      homepage: "https://huggingface.co/datasets/EdinburghNLP/xsum"
      task: text_summarization
    roles: [teacher]

  - name: codesearchnet-python
    interface: benchmark
    parameters:
      description: "CodeSearchNet Python function-to-docstring benchmark"
      homepage: "https://huggingface.co/datasets/code-search-net/code_search_net"
      task: code_explanation
    roles: [teacher]

  - name: aeslc
    interface: benchmark
    parameters:
      description: "AESLC Annotated Enron Subject Line Corpus email benchmark"
      homepage: "https://huggingface.co/datasets/Yale-LILY/aeslc"
      task: email_composition
    roles: [teacher]

  - name: wikitablequestions
    interface: benchmark
    parameters:
      description: "WikiTableQuestions structured table QA benchmark (Stanford)"
      homepage: "https://huggingface.co/datasets/Stanford/wikitablequestions"
      task: data_interpretation
    roles: [teacher]

  # ── Frontier API models (all roles) ────────────────────────────────────────

  - name: gpt-4o
    interface: openai
    parameters:
      model: gpt-4o
      temperature: 0.7
      max_tokens: 512
    roles: [teacher, student, judge]
    role_parameters:
      teacher:
        temperature: 0.8
        max_tokens: 768
      student:
        temperature: 0.7
        max_tokens: 512
      judge:
        temperature: 0.0
        max_tokens: 256

  - name: gpt-4o-mini
    interface: openai
    parameters:
      model: gpt-4o-mini
      temperature: 0.7
      max_tokens: 512
    roles: [teacher, student, judge]
    role_parameters:
      teacher:
        temperature: 0.8
        max_tokens: 768
      student:
        temperature: 0.7
        max_tokens: 512
      judge:
        temperature: 0.0
        max_tokens: 256

  - name: claude-sonnet-4-6
    interface: anthropic
    parameters:
      model: claude-sonnet-4-6
      temperature: 0.7
      max_tokens: 512
    roles: [student, judge]
    role_parameters:
      student:
        temperature: 0.7
        max_tokens: 512
      judge:
        temperature: 0.0
        max_tokens: 256

  - name: claude-3-5-haiku
    interface: anthropic
    parameters:
      model: claude-3-5-haiku-20241022
      temperature: 0.7
      max_tokens: 512
    roles: [student, judge]
    role_parameters:
      student:
        temperature: 0.7
        max_tokens: 512
      judge:
        temperature: 0.0
        max_tokens: 256

  - name: gemini-2.0-flash
    interface: gemini
    parameters:
      model: gemini-2.0-flash
      temperature: 0.7
      max_tokens: 512
    roles: [teacher, student, judge]
    role_parameters:
      teacher:
        temperature: 0.8
        max_tokens: 768
      student:
        temperature: 0.7
        max_tokens: 512
      judge:
        temperature: 0.0
        max_tokens: 256

  # ── Open models via OpenRouter (student; Llama-70B also teacher) ─────────

  - name: llama-3.3-70b
    interface: openrouter
    parameters:
      model: meta-llama/llama-3.3-70b-instruct
      temperature: 0.7
      max_tokens: 512
    roles: [teacher, student]
    role_parameters:
      teacher:
        temperature: 0.8
        max_tokens: 768
      student:
        temperature: 0.7
        max_tokens: 512

  - name: llama-3.1-8b
    interface: openrouter
    parameters:
      model: meta-llama/llama-3.1-8b-instruct
      temperature: 0.7
      max_tokens: 512
    roles: [student]

  - name: mistral-small
    interface: openrouter
    parameters:
      model: mistralai/mistral-small-24b
      temperature: 0.7
      max_tokens: 512
    roles: [student]

  - name: deepseek-v3
    interface: openrouter
    parameters:
      model: deepseek/deepseek-chat
      temperature: 0.7
      max_tokens: 512
    roles: [student]

  - name: qwen2.5-72b
    interface: openrouter
    parameters:
      model: qwen/qwen-2.5-72b-instruct
      temperature: 0.7
      max_tokens: 512
    roles: [student]


# ─── TASKS ─────────────────────────────────────────────────────────────────
#
# Rubric dimensions:
#   [BA] = benchmark-aligned dimension (mechanistically tied to the native metric)
#   Other dimensions capture orthogonal quality axes not measured by the metric.

tasks:

  # ══════════════════════════════════════════════════════════════════════
  # Task 1: Text Summarization
  # Benchmark: XSum (EdinburghNLP/xsum)
  # Native metric: BERTScore-F1 vs. gold summary
  # Benchmark-aligned rubric dimension: faithfulness [BA → BERTScore-F1]
  # ══════════════════════════════════════════════════════════════════════
  - name: text_summarization
    description: >
      Summarise a BBC news article in one concise sentence. The summary must
      be faithful to the article, cover the key information, and be appropriately
      brief. Source benchmark: XSum (EdinburghNLP/xsum).
    output_description: >
      A single sentence (20-50 words) summarising the most important fact or
      event described in the article. No bullet points. No preamble.

    # Static attributes inferred by the benchmark loader
    target_attributes:
      complexity: [simple, moderate, complex, technical]
      domain:     [science, business, politics, technology, health, other]

    nuanced_attributes: {}

    sampling:
      target: [1]
      nuance: [0]
      total:  100   # 100 items × 3 teachers = 300 Phase-3 records total

    # Rubric — one dimension per quality axis.
    # [BA] faithfulness is mechanistically aligned with BERTScore-F1
    # (semantic overlap with the gold summary).
    rubric:
      faithfulness: >
        [BA] The summary contains no hallucinated or incorrect facts relative
        to the source article. High = fully faithful; Medium = minor omission
        or slight imprecision; Low = factual error or unsupported claim.
      information_coverage: >
        The summary captures the single most important fact or event from
        the article. High = central point clearly conveyed; Medium = main
        point present but incomplete; Low = peripheral or wrong focus.
      conciseness: >
        The summary is appropriately brief (one sentence, ≤50 words) with no
        redundancy or filler phrases. High = tight and precise; Medium =
        slightly wordy; Low = multi-sentence or padded.

    evaluation_mode: single

    prompt_library:
      sample: "{prompt}"

  # ══════════════════════════════════════════════════════════════════════
  # Task 2: Code Explanation
  # Benchmark: CodeSearchNet (Python split)
  # Native metric: BERTScore-F1 vs. reference docstring
  # Benchmark-aligned rubric dimension: technical_accuracy [BA → BERTScore]
  # ══════════════════════════════════════════════════════════════════════
  - name: code_explanation
    description: >
      Explain what a given Python function does. The explanation should be
      suitable as a docstring: accurate, clear, and at the appropriate level
      of detail for the function's complexity.
      Source benchmark: CodeSearchNet.
    output_description: >
      A plain-English explanation (40-150 words) of what the function does,
      its parameters, return value, and any notable edge cases or algorithmic
      details. Written as if it were a docstring.

    target_attributes:
      complexity:   [beginner, intermediate, advanced]
      snippet_type: [function, class_definition, algorithm, database_query]

    nuanced_attributes: {}

    sampling:
      target: [1]
      nuance: [0]
      total:  100

    # [BA] technical_accuracy aligns with BERTScore-F1 vs. reference docstring
    rubric:
      technical_accuracy: >
        [BA] All statements about what the code does are factually correct.
        High = fully accurate; Medium = minor error or omission on a
        secondary detail; Low = fundamental misstatement of the code's purpose.
      explanation_clarity: >
        The explanation is clearly written and avoids unnecessary jargon for
        the intended audience. High = immediately clear; Medium = understandable
        but with some unnecessarily complex phrasing; Low = confusing or
        poorly structured.
      completeness: >
        The explanation covers what the function does, its inputs, and its
        output/return value. High = all three addressed; Medium = one aspect
        missing; Low = superficial or incomplete.
      appropriate_level: >
        The depth and vocabulary match the function's actual complexity.
        High = well calibrated; Medium = slightly over- or under-explained;
        Low = wrong level entirely.

    evaluation_mode: single

    prompt_library:
      sample: "{prompt}"

  # ══════════════════════════════════════════════════════════════════════
  # Task 3: Email Composition
  # Benchmark: AESLC (Annotated Enron Subject Line Corpus)
  # Native metric: BERTScore-F1 vs. reference email
  # Benchmark-aligned rubric dimension: content_fidelity [BA → BERTScore-F1]
  # ══════════════════════════════════════════════════════════════════════
  - name: email_composition
    description: >
      Write a professional workplace email matching the specified subject and
      context. The email must be clear, appropriately toned, and complete.
      Source benchmark: AESLC (Annotated Enron Subject Line Corpus).
    output_description: >
      A complete email including Subject line, greeting, body (1-3 paragraphs),
      and sign-off. Tone should be professional. Length should match the context.

    target_attributes:
      purpose: [information_request, project_update, complaint_resolution, proposal, follow_up]
      length:  [brief, standard, detailed]

    nuanced_attributes: {}

    sampling:
      target: [1]
      nuance: [0]
      total:  100

    # [BA] content_fidelity aligns with BERTScore-F1 vs. reference email
    rubric:
      content_fidelity: >
        [BA] The email addresses the specified subject and communicates the
        key information accurately. High = all required information correctly
        conveyed; Medium = main point present but a detail is wrong or missing;
        Low = off-topic or substantively incorrect.
      appropriate_tone: >
        The tone and formality are appropriate for a professional workplace
        context. High = pitch-perfect; Medium = slightly too formal/casual;
        Low = inappropriate tone for the situation.
      completeness: >
        All necessary information relevant to the specified purpose is included
        (subject, greeting, body, sign-off). High = all components present;
        Medium = one component missing or thin; Low = key section absent.
      actionability: >
        Where a response or action is needed, the request is specific and easy
        to act on. High = clear call to action; Medium = action implied but
        not explicit; Low = no action requested or ambiguous.

    evaluation_mode: single

    prompt_library:
      sample: "{prompt}"

  # ══════════════════════════════════════════════════════════════════════
  # Task 4: Data Interpretation
  # Benchmark: WikiTableQuestions
  # Native metric: exact-match accuracy vs. gold answer
  # Benchmark-aligned rubric dimension: numerical_accuracy [BA → exact-match]
  # ══════════════════════════════════════════════════════════════════════
  - name: data_interpretation
    description: >
      Answer a question about a data table by interpreting the table contents.
      The answer must be accurate, clearly stated, and appropriately concise.
      Source benchmark: WikiTableQuestions.
    output_description: >
      A direct answer to the question (1 sentence for factual questions;
      2-3 sentences for comparative or multi-step questions), referencing
      the relevant cells or patterns in the table.

    target_attributes:
      insight_depth: [surface_observation, analytical_interpretation, predictive_inference]

    nuanced_attributes: {}

    sampling:
      target: [1]
      nuance: [0]
      total:  100

    # [BA] numerical_accuracy aligns with exact-match accuracy vs. gold answer
    rubric:
      numerical_accuracy: >
        [BA] Any numerical claims, names, or values match the table exactly.
        High = exact match; Medium = close but a minor formatting or rounding
        difference; Low = incorrect value.
      trend_identification: >
        The answer correctly identifies the relevant row, column, or pattern
        in the table. High = correct location or trend; Medium = partially
        correct; Low = wrong cell or non-existent pattern.
      insight_quality: >
        The answer goes beyond stating the obvious; it interprets the data
        in context. High = insightful and contextualised; Medium = correct
        but literal; Low = irrelevant or misleading interpretation.
      clarity: >
        The answer is clearly stated and directly addresses the question.
        High = unambiguous and direct; Medium = correct but wordy or
        indirect; Low = confusing or not addressing the question.

    evaluation_mode: single

    prompt_library:
      sample: "{prompt}"


# ─── EXPERIMENT ───────────────────────────────────────────────────────────────

experiment:
  id: paper-dual-track-v1
  storage_folder: ./benchmark/runs
  log_level: INFO

  phases:
    # Phases 1-2: Keep — rubrics are static (defined above)
    # Phase 3:    Keep — Track A datapoints are pre-emitted by emit_datapoints.py;
    #                    Track B (synthetic) teachers will generate on first run.
    attribute_mapping:   Keep
    rubric_mapping:      Keep
    data_generation:     Keep
    response_collection: New
    evaluation:          New

  # ── Batch API (50% cost reduction) ───────────────────────────────────────────
  # OpenAI and Anthropic: native batch API (queued; poll with `coeval status`)
  # Gemini: Gemini Batch API (50% off for Flash tier; enabled here)
  batch:
    openai:
      data_generation:     true
      response_collection: true
      evaluation:          true
    anthropic:
      data_generation:     true
      response_collection: true
      evaluation:          true
    gemini:
      data_generation:     true
      response_collection: true
      evaluation:          true

  # ── Per-model quota (safety ceiling) ───────────────────────────────────────────
  # Phase 3 (teacher calls):  3 teachers × 4 tasks × 100 items     = 1,200
  # Phase 4 (student calls): 10 students × 3 teachers × 400 items  = 12,000
  # Phase 5 (judge calls):    3 judges × 10s × 3t × 400 items      = 36,000
  # Limits set with 20% headroom above expected call counts.
  quota:
    gpt-4o:
      max_calls: 20000
    gpt-4o-mini:
      max_calls: 20000
    claude-sonnet-4-6:
      max_calls: 7000
    claude-3-5-haiku:
      max_calls: 7000
    gemini-2.0-flash:
      max_calls: 20000
    llama-3.3-70b:
      max_calls: 7000
    llama-3.1-8b:
      max_calls: 7000
    mistral-small:
      max_calls: 7000
    deepseek-v3:
      max_calls: 7000
    qwen2.5-72b:
      max_calls: 7000

