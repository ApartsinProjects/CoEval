# CoEval -- Mixed Backend Test (OpenAI + HuggingFace)
#
# 2 OpenAI models (cheapest) + 2 HuggingFace models (smallest):
#   gpt-4o-mini   -> teacher + judge  (cheapest capable model)
#   gpt-3.5-turbo -> student          (second cheapest; compare vs HF students)
#   smollm2-135m  -> student only     (135M params; cannot follow structured JSON)
#   smollm2-360m  -> student only     (360M params; cannot follow structured JSON)
#
# API key setup (choose one):
#   Option A -- environment variable (recommended, nothing to change here):
#     export OPENAI_API_KEY=sk-...
#   Option B -- per-model access_key field (fill in below, keep out of git):
#     Copy this file to examples/mixed_backend_openai.yaml (gitignored),
#     then set access_key: sk-... on each OpenAI model entry.
#
# Estimated LLM call budget (static attrs/rubric -> phases 1-2 make 0 LLM calls):
#   Phase 3 (data generation):     1 teacher x 2 items x 1 task =  2 calls [OpenAI]
#   Phase 4 (response collection): 1 teacher x 3 students x 2   =  6 calls [1 OpenAI + 2 HF]
#   Phase 5 (evaluation, single):  1 teacher x 1 judge x 3 x 2  =  6 calls [OpenAI]
#   ---------------------------------------------------------------------------------
#   Total: ~14 calls  (8 OpenAI, 6 HuggingFace)

models:
  # --------------------------------------------------------------------------
  # OpenAI: gpt-4o-mini -- cheapest capable model; teacher + judge
  # --------------------------------------------------------------------------
  - name: gpt-4o-mini
    interface: openai
    parameters:
      model: gpt-4o-mini
      temperature: 0.7
      max_tokens: 512
    roles: [teacher, judge]
    # access_key: XXXXX   # or set OPENAI_API_KEY env var
    role_parameters:
      teacher:
        temperature: 0.8
        max_tokens: 512
      judge:
        temperature: 0.0
        max_tokens: 128

  # --------------------------------------------------------------------------
  # OpenAI: gpt-3.5-turbo -- second cheapest; student for cross-backend comparison
  # --------------------------------------------------------------------------
  - name: gpt-3.5-turbo
    interface: openai
    parameters:
      model: gpt-3.5-turbo
      temperature: 0.5
      max_tokens: 64
    roles: [student]
    # access_key: XXXXX   # or set OPENAI_API_KEY env var

  # --------------------------------------------------------------------------
  # HuggingFace: SmolLM2-135M -- smallest HF model; student only
  # --------------------------------------------------------------------------
  - name: smollm2-135m
    interface: huggingface
    parameters:
      model: HuggingFaceTB/SmolLM2-135M-Instruct
      temperature: 0.5
      max_new_tokens: 64
      device: auto
    roles: [student]

  # --------------------------------------------------------------------------
  # HuggingFace: SmolLM2-360M -- second smallest HF model; student only
  # --------------------------------------------------------------------------
  - name: smollm2-360m
    interface: huggingface
    parameters:
      model: HuggingFaceTB/SmolLM2-360M-Instruct
      temperature: 0.5
      max_new_tokens: 64
      device: auto
    roles: [student]


tasks:
  - name: sentiment
    description: >
      Classify the sentiment of a short customer review as Positive or Negative.
    output_description: >
      A single word -- either Positive or Negative -- with no additional text.

    target_attributes:
      sentiment: [positive, negative]
      intensity:  [mild, strong]

    nuanced_attributes:
      domain: [electronics, food, clothing]
      style:  [direct, sarcastic]

    sampling:
      target: [1, 1]
      nuance: [1, 1]
      total: 2

    rubric:
      accuracy:  "The predicted sentiment (Positive/Negative) matches the true sentiment."
      format:    "The response is a single word with no extra text or punctuation."

    evaluation_mode: single

    prompt_library:
      # gpt-4o-mini teacher: few_shot for reliable structured output
      sample: |
        Generate a benchmark data point for: {task_description}
        Response format: {output_description}
        Required attributes: {target_attributes}. Nuance: {nuanced_attributes}.

        Follow this example format exactly:
        {{"prompt": "This blender broke after two uses and customer service ignored my emails.",
          "response": "Negative"}}

        Now generate a NEW, different data point.
        Return only a JSON object with keys "prompt" and "response". No explanation.


experiment:
  id: mixed-backend-v1
  storage_folder: ./eval_runs
  log_level: INFO

  quota:
    gpt-4o-mini:
      max_calls: 20
    gpt-3.5-turbo:
      max_calls: 10
