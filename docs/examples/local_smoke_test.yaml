# CoEval -- Local Smoke Test
#
# 5 small HuggingFace instruction-tuned models.
# smollm2-135m and smollm2-360m are STUDENT-ONLY: experiment (experiments/
# prompt_format_test.py) confirmed they cannot reliably produce structured
# JSON output in any tested prompt strategy and produce low-quality content
# even with two_step; quality-adjusted pass rate = 0/3 for all strategies.
# smollm2-1b7, qwen2p5-0b5, qwen2p5-1b5 hold all three roles.
#
# Prompt strategy per task (see experiments/results.json for full data):
#   Default template : few_shot with task-specific worked example
#                      (qwen2p5-0b5: 1/3 -> 3/3; smollm2-360m: 0/3 -> 2/3)
#   smollm2-1b7 override : canonical one-sentence baseline
#                           (few_shot causes verbatim example copying for 1.7B)
#
# Estimated LLM call budget (static attrs -> phases 1-2 make 0 LLM calls):
#   Phase 3 (data generation):       3 teachers x 2 items x 2 tasks              =  12 calls
#   Phase 4 (response collection):   3 teachers x 5 students x 2 items x 2 tasks =  60 calls
#   Phase 5 (evaluation, single):    3 teachers x 3 judges x 5 students x 2 items x 2 tasks = 180 calls
#   -------------------------------------------------------------------------------
#   Total:                                                                  ~252 LLM calls
#                                                              (was ~620 before role demotions)
#
# Models sorted from smallest to largest by parameter count.

models:
  # -- 135M: student-only (cannot follow structured-output instructions) ------
  - name: smollm2-135m
    interface: huggingface
    parameters:
      model: HuggingFaceTB/SmolLM2-135M-Instruct
      temperature: 0.7
      max_new_tokens: 512
      device: auto
    roles: [student]
    role_parameters:
      student:
        temperature: 0.5
        max_new_tokens: 64

  # -- 360M: student-only (structured output 0/3 quality on all strategies) ---
  - name: smollm2-360m
    interface: huggingface
    parameters:
      model: HuggingFaceTB/SmolLM2-360M-Instruct
      temperature: 0.7
      max_new_tokens: 512
      device: auto
    roles: [student]
    role_parameters:
      student:
        temperature: 0.5
        max_new_tokens: 64

  # -- 1.7B: all roles; uses canonical baseline (few_shot causes copying) -----
  - name: smollm2-1b7
    interface: huggingface
    parameters:
      model: HuggingFaceTB/SmolLM2-1.7B-Instruct
      temperature: 0.7
      max_new_tokens: 512
      device: auto
    roles: [teacher, student, judge]
    role_parameters:
      teacher:
        temperature: 0.8
        max_new_tokens: 512
      student:
        temperature: 0.5
        max_new_tokens: 64
      judge:
        temperature: 0.0
        max_new_tokens: 128

  # -- 0.5B: all roles; benefits most from few_shot (1/3 -> 3/3) -------------
  - name: qwen2p5-0b5
    interface: huggingface
    parameters:
      model: Qwen/Qwen2.5-0.5B-Instruct
      temperature: 0.7
      max_new_tokens: 512
      device: auto
    roles: [teacher, student, judge]
    role_parameters:
      teacher:
        temperature: 0.8
        max_new_tokens: 512
      student:
        temperature: 0.5
        max_new_tokens: 64
      judge:
        temperature: 0.0
        max_new_tokens: 128

  # -- 1.5B: all roles; robust across strategies, few_shot works fine ---------
  - name: qwen2p5-1b5
    interface: huggingface
    parameters:
      model: Qwen/Qwen2.5-1.5B-Instruct
      temperature: 0.7
      max_new_tokens: 512
      device: auto
    roles: [teacher, student, judge]
    role_parameters:
      teacher:
        temperature: 0.8
        max_new_tokens: 512
      student:
        temperature: 0.5
        max_new_tokens: 64
      judge:
        temperature: 0.0
        max_new_tokens: 128


tasks:
  # -- Task 1: Email subject line ---------------------------------------------
  - name: email_subject
    description: >
      Write a concise email subject line for a given email body.
    output_description: >
      A single subject line of 5 to 12 words that captures the main point.

    target_attributes:
      tone:    [formal, casual]
      urgency: [routine, urgent]
      intent:  [request, announcement]

    nuanced_attributes:
      sender_role:   [peer, manager]
      domain:        [finance, hr]
      writing_style: [terse, verbose]

    sampling:
      target: [1, 1]   # sample exactly 1 target attribute per item
      nuance: [1, 2]   # sample 1-2 nuanced attributes per item
      total: 2         # 2 benchmark items per (task, teacher) pair

    rubric:
      relevance:   "The subject line accurately reflects the main point of the email body."
      conciseness: "The subject line is brief and free of filler or redundant words."

    evaluation_mode: single

    prompt_library:
      # few_shot default: show a worked example before asking for a new one.
      # Experiment result: qwen2p5-0b5 1/3->3/3, smollm2-360m 0/3->2/3 quality-adj.
      # Note: use {{ and }} to produce literal { } after Python str.format().
      sample: |
        Generate a benchmark data point for: {task_description}
        Response format: {output_description}
        Required attributes: {target_attributes}. Nuance: {nuanced_attributes}.

        Follow this example format exactly:
        {{"prompt": "The Q3 results are ready. Please review and share feedback by Wednesday.",
          "response": "Q3 Results Ready -- Feedback Requested by Wednesday"}}

        Now generate a NEW, different data point.
        Return only a JSON object with keys "prompt" and "response". No explanation.

      # smollm2-1b7 override: few_shot causes verbatim example copying for this model.
      # Use the canonical one-sentence baseline instead (experiment: 3/3 quality-adj.).
      sample.smollm2-1b7: >
        Generate a natural benchmark data point for the task {task_description} and produce a
        response {output_description}, where the response is specified with {target_attributes}.
        To make the datapoint naturalistic, use the following nuance parameters:
        {nuanced_attributes}. Return as JSON with exactly two keys: "prompt" and "response".

  # -- Task 2: Sentiment classification --------------------------------------
  - name: text_sentiment
    description: >
      Classify the sentiment of a short customer review.
    output_description: >
      A single word -- either Positive or Negative -- with no additional text.

    target_attributes:
      sentiment: [positive, negative]
      intensity: [mild, strong]
      aspect:    [product, support]

    nuanced_attributes:
      register: [formal, colloquial]
      length:   [one_sentence, multi_sentence]
      style:    [direct, sarcastic]

    sampling:
      target: [1, 1]
      nuance: [1, 2]
      total: 2

    rubric:
      accuracy:    "The predicted sentiment matches the true sentiment expressed in the review."
      calibration: "The label is consistent with the intensity and phrasing of the review."

    evaluation_mode: single

    prompt_library:
      # few_shot default with a sentiment-classification worked example.
      sample: |
        Generate a benchmark data point for: {task_description}
        Response format: {output_description}
        Required attributes: {target_attributes}. Nuance: {nuanced_attributes}.

        Follow this example format exactly:
        {{"prompt": "I've been using this product for a month and it works exactly as described.",
          "response": "Positive"}}

        Now generate a NEW, different data point.
        Return only a JSON object with keys "prompt" and "response". No explanation.

      # smollm2-1b7 override: same reasoning as email_subject task.
      sample.smollm2-1b7: >
        Generate a natural benchmark data point for the task {task_description} and produce a
        response {output_description}, where the response is specified with {target_attributes}.
        To make the datapoint naturalistic, use the following nuance parameters:
        {nuanced_attributes}. Return as JSON with exactly two keys: "prompt" and "response".


experiment:
  id: "local-smoke-test-v2"
  storage_folder: "./eval_runs"
  log_level: INFO
