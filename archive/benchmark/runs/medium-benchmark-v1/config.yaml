tasks:
- description: 'Summarise a given passage of text. The summary must capture all key
    information at the specified depth, match the required tone, and be appropriate
    for the target audience.

    '
  evaluation_mode: single
  name: text_summarization
  nuanced_attributes:
    domain:
    - science
    - business
    - politics
    - technology
    - health
    emphasis:
    - key_facts
    - main_argument
    - practical_implications
    perspective:
    - objective
    - opinionated
    - balanced
    source_type:
    - news_article
    - academic_paper
    - corporate_report
    - blog_post
    writing_style:
    - analytical
    - descriptive
    - narrative
  output_description: 'A summary of the passage (50-150 words for moderate/detailed;
    1-2 sentences for brief) in plain prose. The tone must match the specification.
    No bullet points unless format is explicitly bullet_points.

    '
  prompt_library:
    sample: "Generate a benchmark data point for: {task_description}\nResponse format:\
      \ {output_description}\nRequired attributes: {target_attributes}. Nuance: {nuanced_attributes}.\n\
      \nFollow this example format exactly:\n{{\"prompt\": \"The global average temperature\
      \ has risen by approximately 1.1°C since pre-industrial times, driven primarily\
      \ by the burning of fossil fuels. This warming has accelerated ice sheet melting,\
      \ sea level rise, and extreme weather events. Scientists warn that exceeding\
      \ 1.5°C will trigger irreversible tipping points. Governments have pledged emissions\
      \ reductions under the Paris Agreement, though current commitments fall short\
      \ of what is needed.\",\n  \"response\": \"Global temperatures have risen 1.1°C\
      \ above pre-industrial levels due to fossil fuel emissions, causing accelerating\
      \ ice loss, sea level rise, and extreme weather. While governments have made\
      \ Paris Agreement pledges, scientists warn current commitments are insufficient\
      \ to prevent passing the critical 1.5°C threshold.\"}}\n\nNow generate a NEW,\
      \ different data point fitting the required attributes.\nReturn only a JSON\
      \ object with keys \"prompt\" and \"response\". No explanation.\n"
    sample.smollm2-1b7: 'Generate a natural benchmark data point for the task {task_description}
      and produce a response {output_description}, where the response is specified
      with {target_attributes}. To make the datapoint naturalistic, use the following
      nuance parameters: {nuanced_attributes}. Return as JSON with exactly two keys:
      "prompt" and "response".

      '
  rubric:
    accuracy: The summary correctly captures the main points without distortion or
      fabrication.
    completeness: No key points from the passage are omitted given the specified depth.
    conciseness: The summary avoids redundancy and stays within the specified length
      and format.
    readability: The summary is grammatically correct, well-structured, and easy to
      read.
    tone_consistency: The tone matches the specified requirement throughout the summary.
  sampling:
    nuance:
    - 1
    - 2
    target:
    - 1
    - 2
    total: 20
  target_attributes:
    audience:
    - general_public
    - professional
    - expert
    - student
    complexity:
    - simple
    - moderate
    - complex
    - technical
    format:
    - paragraph
    - bullet_points
    - headline_and_body
    length:
    - brief
    - moderate
    - detailed
    tone:
    - neutral
    - formal
    - conversational
    - critical
- description: 'Explain a given code snippet clearly for the specified audience and
    at the specified depth. The explanation must match the programming language, complexity
    level, and chosen explanation style.

    '
  evaluation_mode: single
  name: code_explanation
  nuanced_attributes:
    code_quality:
    - clean_idiomatic
    - legacy_style
    - optimised
    - deliberately_buggy
    documentation_level:
    - undocumented
    - partially_documented
    - well_documented
    error_handling:
    - no_error_handling
    - basic_try_catch
    - robust_validation
    paradigm:
    - functional
    - object_oriented
    - procedural
    - declarative
    use_case:
    - web_backend
    - data_processing
    - system_administration
    - automation
  output_description: 'A code explanation (80-200 words) that addresses what the code
    does, how it works, and (where depth requires) why it is structured that way.
    Technical depth and vocabulary must match the audience level.

    '
  prompt_library:
    sample: "Generate a benchmark data point for: {task_description}\nResponse format:\
      \ {output_description}\nRequired attributes: {target_attributes}. Nuance: {nuanced_attributes}.\n\
      \nFollow this example format exactly:\n{{\"prompt\": \"def fibonacci(n):\\n\
      \    if n <= 1:\\n        return n\\n    return fibonacci(n-1) + fibonacci(n-2)\"\
      ,\n  \"response\": \"This Python function computes the nth Fibonacci number\
      \ using recursion. When called with n, it returns n directly if n is 0 or 1\
      \ (the base cases). Otherwise, it calls itself twice — once with n-1 and once\
      \ with n-2 — and adds the results. While elegant, this naive recursion recalculates\
      \ the same values repeatedly, making it exponentially slow for large n.\"}}\n\
      \nNow generate a NEW, different data point fitting the required attributes.\n\
      Return only a JSON object with keys \"prompt\" and \"response\". No explanation.\n"
    sample.smollm2-1b7: 'Generate a natural benchmark data point for the task {task_description}
      and produce a response {output_description}, where the response is specified
      with {target_attributes}. To make the datapoint naturalistic, use the following
      nuance parameters: {nuanced_attributes}. Return as JSON with exactly two keys:
      "prompt" and "response".

      '
  rubric:
    appropriate_level: The depth and vocabulary precisely match the specified audience
      and depth level.
    clarity: The explanation is clearly written and avoids unnecessary jargon for
      the audience level.
    completeness: The explanation covers all significant parts of the snippet without
      skipping key logic.
    practical_value: The explanation helps the reader understand when and how to use
      or avoid this pattern.
    structure: The explanation is logically ordered; ideas flow naturally from one
      to the next.
    technical_accuracy: All statements about what the code does are factually correct.
  sampling:
    nuance:
    - 1
    - 2
    target:
    - 1
    - 2
    total: 20
  target_attributes:
    audience:
    - novice_programmer
    - junior_developer
    - senior_engineer
    - non_technical
    complexity:
    - beginner
    - intermediate
    - advanced
    depth:
    - surface
    - standard
    - deep_dive
    explanation_style:
    - step_by_step
    - conceptual_overview
    - example_driven
    - annotated_walkthrough
    language:
    - python
    - javascript
    - java
    - sql
    - bash
    snippet_type:
    - function
    - class_definition
    - algorithm
    - database_query
    - shell_script
- description: 'Write a professional email matching the specified purpose, tone, urgency,
    and length. The email must be appropriate for the described relationship and organisational
    context.

    '
  evaluation_mode: single
  name: email_composition
  nuanced_attributes:
    communication_style:
    - direct
    - diplomatic
    - persuasive
    - collaborative
    cultural_context:
    - western_professional
    - globally_neutral
    - regional_informal
    industry:
    - technology
    - finance
    - healthcare
    - education
    - manufacturing
    relationship:
    - established_colleague
    - new_contact
    - long_term_client
    - vendor
    - cross_team
    sender_role:
    - individual_contributor
    - team_lead
    - department_head
    - executive
    subject_sensitivity:
    - routine
    - sensitive
    - politically_charged
    - confidential
  output_description: 'A complete email including Subject line, greeting, body (2-4
    paragraphs for standard/detailed; 1 short paragraph for brief), and sign-off.
    Tone and formality must precisely match the specification.

    '
  prompt_library:
    sample: "Generate a benchmark data point for: {task_description}\nResponse format:\
      \ {output_description}\nRequired attributes: {target_attributes}. Nuance: {nuanced_attributes}.\n\
      \nFollow this example format exactly:\n{{\"prompt\": \"Write an email to your\
      \ manager requesting approval to attend an industry conference next month. The\
      \ conference costs $1,200 and is directly relevant to your current project.\"\
      ,\n  \"response\": \"Subject: Conference Attendance Request — TechSummit 2024\\\
      n\\nDear Sarah,\\n\\nI would like to request approval to attend TechSummit 2024,\
      \ scheduled for March 14-16 in Chicago. The conference programme includes sessions\
      \ directly aligned with our Q2 platform migration project, particularly the\
      \ track on distributed system architecture.\\n\\nThe registration fee is $1,200,\
      \ with estimated travel and accommodation costs of $800, bringing the total\
      \ to approximately $2,000. I believe the insights gained would accelerate our\
      \ current timeline and reduce risk on the migration.\\n\\nPlease let me know\
      \ if you need any additional information to support this request.\\n\\nBest\
      \ regards,\\nAlex\"}}\n\nNow generate a NEW, different data point fitting the\
      \ required attributes.\nReturn only a JSON object with keys \"prompt\" and \"\
      response\". No explanation.\n"
    sample.smollm2-1b7: 'Generate a natural benchmark data point for the task {task_description}
      and produce a response {output_description}, where the response is specified
      with {target_attributes}. To make the datapoint naturalistic, use the following
      nuance parameters: {nuanced_attributes}. Return as JSON with exactly two keys:
      "prompt" and "response".

      '
  rubric:
    actionability: Where a response or action is needed, the request is specific and
      easy to act on.
    appropriate_tone: The tone and formality precisely match the specified relationship
      and context.
    clarity: The email communicates its purpose unambiguously in the first paragraph.
    completeness: All necessary information is included; nothing critical is omitted.
    professionalism: The email is free of grammatical errors and follows professional
      email conventions.
  sampling:
    nuance:
    - 1
    - 2
    target:
    - 1
    - 2
    total: 20
  target_attributes:
    formality:
    - peer_to_peer
    - manager_to_report
    - report_to_manager
    - external_client
    - executive
    length:
    - brief
    - standard
    - detailed
    purpose:
    - information_request
    - project_update
    - complaint_resolution
    - proposal
    - follow_up
    tone:
    - formal
    - semi_formal
    - casual
    - assertive
    - empathetic
    urgency:
    - low
    - medium
    - high
    - critical
- description: 'Interpret a described dataset or visualisation for the specified audience
    and domain. The interpretation must identify the key trend, explain its significance,
    and offer appropriate observations at the specified depth.

    '
  evaluation_mode: single
  name: data_interpretation
  nuanced_attributes:
    comparison_type:
    - year_over_year
    - benchmark_vs_target
    - regional_breakdown
    - before_after
    data_quality:
    - clean_complete
    - missing_values_noted
    - noisy_uncertain
    industry_context:
    - retail
    - healthcare
    - government_policy
    - manufacturing
    - fintech
    presentation_context:
    - board_presentation
    - academic_publication
    - news_report
    - internal_dashboard
    time_period:
    - monthly
    - quarterly
    - annual
    - multi_year_longitudinal
  output_description: 'An interpretation (80-200 words) that identifies the primary
    trend, explains what it means in context, notes any notable anomalies or caveats,
    and concludes with an insight or implication for the audience. Statistical claims
    must be appropriate to the data complexity level.

    '
  prompt_library:
    sample: "Generate a benchmark data point for: {task_description}\nResponse format:\
      \ {output_description}\nRequired attributes: {target_attributes}. Nuance: {nuanced_attributes}.\n\
      \nFollow this example format exactly:\n{{\"prompt\": \"The line graph shows\
      \ monthly website visitors for an e-commerce platform from January to December\
      \ 2023. Values were: Jan 45K, Feb 42K, Mar 48K, Apr 51K, May 55K, Jun 60K, Jul\
      \ 58K, Aug 62K, Sep 70K, Oct 85K, Nov 120K, Dec 95K.\",\n  \"response\": \"\
      Website traffic grew steadily through 2023, rising approximately 33% from January\
      \ to August, before accelerating sharply in Q4. The November spike to 120K visitors\
      \ — a 71% jump from September — is consistent with Black Friday and holiday\
      \ shopping behaviour and represents the single largest month-over-month gain.\
      \ The December dip to 95K suggests post-holiday normalisation rather than sustained\
      \ demand. The underlying Q1-Q3 growth trend points to healthy organic acquisition,\
      \ making the Q4 peaks a multiplier on an already-improving baseline rather than\
      \ a one-off anomaly.\"}}\n\nNow generate a NEW, different data point fitting\
      \ the required attributes.\nReturn only a JSON object with keys \"prompt\" and\
      \ \"response\". No explanation.\n"
    sample.smollm2-1b7: 'Generate a natural benchmark data point for the task {task_description}
      and produce a response {output_description}, where the response is specified
      with {target_attributes}. To make the datapoint naturalistic, use the following
      nuance parameters: {nuanced_attributes}. Return as JSON with exactly two keys:
      "prompt" and "response".

      '
  rubric:
    accuracy: All numerical claims and trend descriptions accurately reflect the described
      data.
    actionability: The conclusion or implication is specific and useful for the stated
      audience.
    appropriate_caveats: Limitations in the data are acknowledged where relevant;
      claims are not overstated.
    clarity: 'The interpretation is clearly structured: observation → explanation
      → implication.'
    insight_quality: The interpretation goes beyond stating the obvious; it explains
      why the trend matters.
    statistical_literacy: Statistical language is used correctly and proportionally
      to the data complexity.
  sampling:
    nuance:
    - 1
    - 2
    target:
    - 1
    - 2
    total: 20
  target_attributes:
    audience:
    - executive
    - data_analyst
    - technical_specialist
    - general_public
    complexity:
    - single_variable
    - bivariate_comparison
    - multivariate_statistical
    data_type:
    - bar_chart
    - line_graph
    - scatter_plot
    - pivot_table
    - heatmap
    - histogram
    domain:
    - sales_revenue
    - public_health
    - climate
    - financial_markets
    - demographics
    insight_depth:
    - surface_observation
    - analytical_interpretation
    - predictive_inference
    trend_type:
    - upward_growth
    - downward_decline
    - seasonal_cycle
    - flat_stable
    - anomalous_spike
