# ─── TASKS ─────────────────────────────────────────────────────────────────
#
# Rubric dimensions:
#   [BA] = benchmark-aligned dimension (mechanistically tied to the native metric)
#   Other dimensions capture orthogonal quality axes not measured by the metric.

tasks:

  # ══════════════════════════════════════════════════════════════════════
  # Task 1: Text Summarization
  # Benchmark: XSum (EdinburghNLP/xsum)
  # Native metric: BERTScore-F1 vs. gold summary
  # Benchmark-aligned rubric dimension: faithfulness [BA → BERTScore-F1]
  # ══════════════════════════════════════════════════════════════════════
  - name: text_summarization
    description: >
      Summarise a BBC news article in one concise sentence. The summary must
      be faithful to the article, cover the key information, and be appropriately
      brief. Source benchmark: XSum (EdinburghNLP/xsum).
    output_description: >
      A single sentence (20-50 words) summarising the most important fact or
      event described in the article. No bullet points. No preamble.

    # Static attributes inferred by the benchmark loader
    target_attributes:
      complexity: [simple, moderate, complex, technical]
      domain:     [science, business, politics, technology, health, other]

    nuanced_attributes:
      article_length:  [short_200w, medium_400w, long_600w]
      narrative_type:  [event_report, feature_piece, analysis_commentary]

    sampling:
      target: [1]
      nuance: [1, 2]
      total:  100   # 100 items per teacher; 4 LLM + 1 benchmark (xsum) = 500 per task

    # Rubric — one dimension per quality axis.
    # [BA] faithfulness is mechanistically aligned with BERTScore-F1
    # (semantic overlap with the gold summary).
    rubric:
      faithfulness: >
        [BA] The summary contains no hallucinated or incorrect facts relative
        to the source article. High = fully faithful; Medium = minor omission
        or slight imprecision; Low = factual error or unsupported claim.
      information_coverage: >
        The summary captures the single most important fact or event from
        the article. High = central point clearly conveyed; Medium = main
        point present but incomplete; Low = peripheral or wrong focus.
      conciseness: >
        The summary is appropriately brief (one sentence, ≤50 words) with no
        redundancy or filler phrases. High = tight and precise; Medium =
        slightly wordy; Low = multi-sentence or padded.

    evaluation_mode: single

    prompt_library:
      sample: |
        You are generating synthetic benchmark data for a text summarisation task
        modelled on the BBC XSum dataset (one-sentence news summaries).

        Task description: {task_description}
        Output format: {output_description}
        Required target attributes (must be reflected in the article): {target_attributes}
        Required nuance attributes (must shape the writing style): {nuanced_attributes}

        Write a realistic BBC-style news article excerpt whose length matches article_length
        (short_200w ≈ 200 words, medium_400w ≈ 400 words, long_600w ≈ 600 words) and whose
        narrative style matches narrative_type (event_report = factual news event,
        feature_piece = human-interest story, analysis_commentary = opinion/analysis).
        The domain and complexity must match the target attributes.

        Then write a gold one-sentence summary (20–50 words) capturing the single most
        newsworthy fact from the article.

        Return ONLY valid JSON — no markdown fences, no explanation:
        {{"prompt": "<article text>", "response": "<one-sentence summary>"}}

  # ══════════════════════════════════════════════════════════════════════
  # Task 2: Code Explanation
  # Benchmark: CodeSearchNet (Python split)
  # Native metric: BERTScore-F1 vs. reference docstring
  # Benchmark-aligned rubric dimension: technical_accuracy [BA → BERTScore]
  # ══════════════════════════════════════════════════════════════════════
  - name: code_explanation
    description: >
      Explain what a given Python function does. The explanation should be
      suitable as a docstring: accurate, clear, and at the appropriate level
      of detail for the function's complexity.
      Source benchmark: CodeSearchNet.
    output_description: >
      A plain-English explanation (40-150 words) of what the function does,
      its parameters, return value, and any notable edge cases or algorithmic
      details. Written as if it were a docstring.

    target_attributes:
      complexity:   [beginner, intermediate, advanced]
      snippet_type: [function, class_definition, algorithm, database_query]

    nuanced_attributes:
      doc_style:        [brief_one_liner, detailed_prose, step_by_step, api_reference]
      abstraction_level: [implementation_details, behavioral_description, conceptual_overview]

    sampling:
      target: [1]
      nuance: [1, 2]
      total:  100   # 100 items per teacher; 4 LLM + 1 benchmark (codesearchnet-python) = 500 per task

    # [BA] technical_accuracy aligns with BERTScore-F1 vs. reference docstring
    rubric:
      technical_accuracy: >
        [BA] All statements about what the code does are factually correct.
        High = fully accurate; Medium = minor error or omission on a
        secondary detail; Low = fundamental misstatement of the code's purpose.
      explanation_clarity: >
        The explanation is clearly written and avoids unnecessary jargon for
        the intended audience. High = immediately clear; Medium = understandable
        but with some unnecessarily complex phrasing; Low = confusing or
        poorly structured.
      completeness: >
        The explanation covers what the function does, its inputs, and its
        output/return value. High = all three addressed; Medium = one aspect
        missing; Low = superficial or incomplete.
      appropriate_level: >
        The depth and vocabulary match the function's actual complexity.
        High = well calibrated; Medium = slightly over- or under-explained;
        Low = wrong level entirely.

    evaluation_mode: single

    prompt_library:
      sample: |
        You are generating synthetic benchmark data for a code explanation task
        modelled on the CodeSearchNet Python benchmark (function-to-docstring).

        Task description: {task_description}
        Output format: {output_description}
        Required target attributes (must be reflected in the code snippet): {target_attributes}
        Required nuance attributes (must shape the explanation style): {nuanced_attributes}

        Write a realistic, self-contained Python function (8–40 lines) matching the specified
        complexity and snippet_type. The function must be syntactically valid Python.

        Then write a gold explanation matching doc_style (brief_one_liner = one sentence,
        detailed_prose = flowing paragraphs, step_by_step = numbered steps,
        api_reference = parameter/return table) and abstraction_level
        (implementation_details = how it works internally, behavioral_description = what it
        does from a caller's perspective, conceptual_overview = high-level purpose).

        Return ONLY valid JSON — no markdown fences, no explanation:
        {{"prompt": "<python function code>", "response": "<explanation>"}}

  # ══════════════════════════════════════════════════════════════════════
  # Task 3: Email Composition
  # Benchmark: AESLC (Annotated Enron Subject Line Corpus)
  # Native metric: BERTScore-F1 vs. reference email
  # Benchmark-aligned rubric dimension: content_fidelity [BA → BERTScore-F1]
  # ══════════════════════════════════════════════════════════════════════
  - name: email_composition
    description: >
      Write a professional workplace email matching the specified subject and
      context. The email must be clear, appropriately toned, and complete.
      Source benchmark: AESLC (Annotated Enron Subject Line Corpus).
    output_description: >
      A complete email including Subject line, greeting, body (1-3 paragraphs),
      and sign-off. Tone should be professional. Length should match the context.

    target_attributes:
      purpose: [information_request, project_update, complaint_resolution, proposal, follow_up]
      length:  [brief, standard, detailed]

    nuanced_attributes:
      formality:     [formal, semi_formal, casual]
      urgency:       [low, medium, high]

    sampling:
      target: [1]
      nuance: [1, 2]
      total:  100   # 100 items per teacher; 4 LLM + 1 benchmark (aeslc) = 500 per task

    # [BA] content_fidelity aligns with BERTScore-F1 vs. reference email
    rubric:
      content_fidelity: >
        [BA] The email addresses the specified subject and communicates the
        key information accurately. High = all required information correctly
        conveyed; Medium = main point present but a detail is wrong or missing;
        Low = off-topic or substantively incorrect.
      appropriate_tone: >
        The tone and formality are appropriate for a professional workplace
        context. High = pitch-perfect; Medium = slightly too formal/casual;
        Low = inappropriate tone for the situation.
      completeness: >
        All necessary information relevant to the specified purpose is included
        (subject, greeting, body, sign-off). High = all components present;
        Medium = one component missing or thin; Low = key section absent.
      actionability: >
        Where a response or action is needed, the request is specific and easy
        to act on. High = clear call to action; Medium = action implied but
        not explicit; Low = no action requested or ambiguous.

    evaluation_mode: single

    prompt_library:
      sample: |
        You are generating synthetic benchmark data for an email composition task
        modelled on the AESLC (Annotated Enron Subject Line Corpus) benchmark.

        Task description: {task_description}
        Output format: {output_description}
        Required target attributes (must be reflected in the email scenario): {target_attributes}
        Required nuance attributes (must shape tone and urgency): {nuanced_attributes}

        Create a realistic workplace scenario description (1–2 sentences) as the prompt,
        then write a complete gold email (Subject, greeting, body, sign-off) that responds
        to the scenario. The email's purpose and length must match the target attributes;
        the formality (formal = Dear Mr/Ms + full grammar, semi_formal = Hi Name + friendly
        but professional, casual = Hey Name + conversational) and urgency level must match
        the nuanced attributes.

        Return ONLY valid JSON — no markdown fences, no explanation:
        {{"prompt": "<scenario description>", "response": "<complete email with Subject: line, greeting, body, sign-off>"}}

  # ══════════════════════════════════════════════════════════════════════
  # Task 4: Data Interpretation
  # Benchmark: WikiTableQuestions
  # Native metric: exact-match accuracy vs. gold answer
  # Benchmark-aligned rubric dimension: numerical_accuracy [BA → exact-match]
  # ══════════════════════════════════════════════════════════════════════
  - name: data_interpretation
    description: >
      Answer a question about a data table by interpreting the table contents.
      The answer must be accurate, clearly stated, and appropriately concise.
      Source benchmark: WikiTableQuestions.
    output_description: >
      A direct answer to the question (1 sentence for factual questions;
      2-3 sentences for comparative or multi-step questions), referencing
      the relevant cells or patterns in the table.

    target_attributes:
      insight_depth: [surface_observation, analytical_interpretation, predictive_inference]

    nuanced_attributes:
      question_type:  [single_lookup, comparison, aggregation, temporal_trend]
      table_domain:   [sports, geography, history, science, finance]

    sampling:
      target: [1]
      nuance: [1, 2]
      total:  100   # 100 items per teacher; 4 LLM + 1 benchmark (wikitablequestions) = 500 per task

    # [BA] numerical_accuracy aligns with exact-match accuracy vs. gold answer
    rubric:
      numerical_accuracy: >
        [BA] Any numerical claims, names, or values match the table exactly.
        High = exact match; Medium = close but a minor formatting or rounding
        difference; Low = incorrect value.
      trend_identification: >
        The answer correctly identifies the relevant row, column, or pattern
        in the table. High = correct location or trend; Medium = partially
        correct; Low = wrong cell or non-existent pattern.
      insight_quality: >
        The answer goes beyond stating the obvious; it interprets the data
        in context. High = insightful and contextualised; Medium = correct
        but literal; Low = irrelevant or misleading interpretation.
      clarity: >
        The answer is clearly stated and directly addresses the question.
        High = unambiguous and direct; Medium = correct but wordy or
        indirect; Low = confusing or not addressing the question.

    evaluation_mode: single

    prompt_library:
      sample: |
        You are generating synthetic benchmark data for a data interpretation task
        modelled on the WikiTableQuestions benchmark (answering questions about HTML tables).

        Task description: {task_description}
        Output format: {output_description}
        Required target attributes (must be reflected in the question difficulty): {target_attributes}
        Required nuance attributes (must shape the table and question style): {nuanced_attributes}

        Create a realistic Markdown table (3–8 rows, 3–6 columns) on a topic matching the
        table_domain attribute. Then write a question whose answer_type matches question_type
        (single_lookup = find one cell value, comparison = compare two rows/columns,
        aggregation = count/sum/average, temporal_trend = describe change over time).
        The question's insight_depth must match the target attribute.

        The prompt field must contain the question followed by the table:
        "Question: <question>\\n\\nTable:\\n<markdown table>"

        Return ONLY valid JSON — no markdown fences, no explanation:
        {{"prompt": "Question: <question>\\n\\nTable:\\n<markdown table>", "response": "<concise gold answer>"}}


# ─── EXPERIMENT ───────────────────────────────────────────────────────────────

experiment:
  id: paper-dual-track-v1
  storage_folder: ./Runs
  log_level: INFO

  phases:
    # Phases 1-2: Keep — rubrics are static (defined above)
    # Phase 3:    Keep — Track A datapoints are pre-emitted by emit_datapoints.py;
    #                    Track B (synthetic) teachers will generate on first run.
    attribute_mapping:   Keep
    rubric_mapping:      Keep
    data_generation:     Keep
    response_collection: New
    evaluation:          New

  # ── Batch API (50% cost reduction) ───────────────────────────────────────────
  # OpenAI and Anthropic: native batch API (queued; poll with `coeval status`)
  # Gemini: Gemini Batch API (50% off for Flash tier; enabled here)
  batch:
    openai:
      data_generation:     true
      response_collection: true
      evaluation:          true
    anthropic:
      data_generation:     true
      response_collection: true
      evaluation:          true
    gemini:
      data_generation:     true
      response_collection: true
      evaluation:          true

  # ── Per-model quota (safety ceiling) ─────────────────────────────────────────
  # All 10 LLM models: teacher (400) + student (4,400) + judge (44,000) = 48,800
  # Per-model max = 48,800 × 1.2 headroom ≈ 59,000 → set to 60,000
  quota:
    gpt-4o:
      max_calls: 60000
    gpt-4o-mini:
      max_calls: 60000
    claude-sonnet-4-6:
      max_calls: 60000
    claude-3-5-haiku:
      max_calls: 60000
    gemini-2.0-flash:
      max_calls: 60000
    llama-3.3-70b:
      max_calls: 60000
    llama-3.1-8b:
      max_calls: 60000
    mistral-small:
      max_calls: 60000
    deepseek-v3:
      max_calls: 60000
    qwen2.5-72b:
      max_calls: 60000

