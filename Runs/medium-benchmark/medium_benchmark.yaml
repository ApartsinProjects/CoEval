# CoEval — Medium Benchmark
# =============================================================================
# Purpose : Cross-backend benchmark with 2 cheap OpenAI models and 3 small
#           HuggingFace models, all holding teacher + student + judge roles.
#           4 tasks × 20 datapoints each = 80 datapoints per teacher.
#
# Models  : gpt-4o-mini   (OpenAI, cheapest)
#           gpt-3.5-turbo (OpenAI, second cheapest)
#           qwen2p5-0b5   (HF, 0.5B — smallest capable of all 3 roles)
#           qwen2p5-1b5   (HF, 1.5B — solid JSON output across strategies)
#           smollm2-1b7   (HF, 1.7B — all roles; uses canonical prompt to avoid copying)
#
# Tasks   : 4 tasks × 20 items = 80 total datapoints per teacher
#           text_summarization, code_explanation, email_composition, data_interpretation
#
# Rubric  : Static per task (5-6 criteria each) — phases 1 & 2 make 0 LLM calls
#
# Call budget (static attrs/rubrics => phases 1-2 = 0 calls):
#   Phase 3  data generation:     5 teachers × 4 tasks × 20 items        =   400
#   Phase 4  response collection: 400 datapoints × 5 students             = 2,000
#   Phase 5  evaluation (single): 400 datapoints × 5 students × 5 judges = 10,000
#   -------------------------------------------------------------------
#   Total: ~12,400 calls  (≈ 5,000 OpenAI, ≈ 7,400 HuggingFace)
#
# API key: set OPENAI_API_KEY environment variable before running.
# =============================================================================


# ─── MODELS ──────────────────────────────────────────────────────────────────

models:

  # --------------------------------------------------------------------------
  # gpt-4o-mini: cheapest OpenAI model — all three roles
  # --------------------------------------------------------------------------
  - name: gpt-4o-mini
    interface: openai
    parameters:
      model: gpt-4o-mini
      temperature: 0.7
      max_tokens: 512
    roles: [teacher, student, judge]
    # access_key: sk-...    # or set OPENAI_API_KEY env var
    role_parameters:
      teacher:
        temperature: 0.8
        max_tokens: 512
      student:
        temperature: 0.7
        max_tokens: 256
      judge:
        temperature: 0.0
        max_tokens: 128

  # --------------------------------------------------------------------------
  # gpt-3.5-turbo: second cheapest OpenAI model — all three roles
  # --------------------------------------------------------------------------
  - name: gpt-3.5-turbo
    interface: openai
    parameters:
      model: gpt-3.5-turbo
      temperature: 0.7
      max_tokens: 512
    roles: [teacher, student, judge]
    # access_key: sk-...
    role_parameters:
      teacher:
        temperature: 0.8
        max_tokens: 512
      student:
        temperature: 0.7
        max_tokens: 256
      judge:
        temperature: 0.0
        max_tokens: 128

  # --------------------------------------------------------------------------
  # Qwen2.5-0.5B-Instruct: smallest HF model — teacher + student only.
  # NOTE: Removed from judge role — 0.5B model produces empty JSON output
  # when acting as judge (insufficient capacity for structured scoring).
  # --------------------------------------------------------------------------
  - name: qwen2p5-0b5
    interface: huggingface
    parameters:
      model: Qwen/Qwen2.5-0.5B-Instruct
      temperature: 0.7
      max_new_tokens: 512
      device: auto
      load_in_4bit: true
    roles: [teacher, student]
    role_parameters:
      teacher:
        temperature: 0.8
        max_new_tokens: 512
      student:
        temperature: 0.7
        max_new_tokens: 256

  # --------------------------------------------------------------------------
  # Qwen2.5-1.5B-Instruct: second smallest capable HF model — all three roles
  # Robust across prompt strategies; few_shot works well.
  # --------------------------------------------------------------------------
  - name: qwen2p5-1b5
    interface: huggingface
    parameters:
      model: Qwen/Qwen2.5-1.5B-Instruct
      temperature: 0.7
      max_new_tokens: 512
      device: auto
      load_in_4bit: true
    roles: [teacher, student, judge]
    role_parameters:
      teacher:
        temperature: 0.8
        max_new_tokens: 512
      student:
        temperature: 0.7
        max_new_tokens: 256
      judge:
        temperature: 0.0
        max_new_tokens: 256   # increased: 1.5B needs more tokens to complete JSON scoring

  # --------------------------------------------------------------------------
  # SmolLM2-1.7B-Instruct: third smallest capable HF model — all three roles
  # Uses canonical one-sentence prompt (few_shot causes verbatim copying).
  # --------------------------------------------------------------------------
  - name: smollm2-1b7
    interface: huggingface
    parameters:
      model: HuggingFaceTB/SmolLM2-1.7B-Instruct
      temperature: 0.7
      max_new_tokens: 512
      device: auto
      load_in_4bit: true
    roles: [teacher, student, judge]
    role_parameters:
      teacher:
        temperature: 0.8
        max_new_tokens: 512
      student:
        temperature: 0.7
        max_new_tokens: 256
      judge:
        temperature: 0.0
        max_new_tokens: 256   # increased: 1.7B needs more tokens to complete JSON scoring


# ─── TASKS ───────────────────────────────────────────────────────────────────

tasks:

  # ════════════════════════════════════════════════════════════════════════════
  # Task 1: Text Summarization
  # 5 target attributes · 5 nuanced attributes · 5 rubric criteria
  # ════════════════════════════════════════════════════════════════════════════

  - name: text_summarization
    description: >
      Summarise a given passage of text. The summary must capture all key
      information at the specified depth, match the required tone, and be
      appropriate for the target audience.
    output_description: >
      A summary of the passage (50-150 words for moderate/detailed; 1-2 sentences
      for brief) in plain prose. The tone must match the specification. No bullet
      points unless format is explicitly bullet_points.

    target_attributes:
      complexity:   [simple, moderate, complex, technical]
      tone:         [neutral, formal, conversational, critical]
      length:       [brief, moderate, detailed]
      audience:     [general_public, professional, expert, student]
      format:       [paragraph, bullet_points, headline_and_body]

    nuanced_attributes:
      domain:       [science, business, politics, technology, health]
      source_type:  [news_article, academic_paper, corporate_report, blog_post]
      writing_style: [analytical, descriptive, narrative]
      perspective:  [objective, opinionated, balanced]
      emphasis:     [key_facts, main_argument, practical_implications]

    sampling:
      target: [1, 2]
      nuance: [1, 2]
      total: 20

    rubric:
      accuracy:         "The summary correctly captures the main points without distortion or fabrication."
      conciseness:      "The summary avoids redundancy and stays within the specified length and format."
      readability:      "The summary is grammatically correct, well-structured, and easy to read."
      tone_consistency: "The tone matches the specified requirement throughout the summary."
      completeness:     "No key points from the passage are omitted given the specified depth."

    evaluation_mode: single

    prompt_library:
      sample: |
        Generate a benchmark data point for: {task_description}
        Response format: {output_description}
        Required attributes: {target_attributes}. Nuance: {nuanced_attributes}.

        Follow this example format exactly:
        {{"prompt": "The global average temperature has risen by approximately 1.1°C since pre-industrial times, driven primarily by the burning of fossil fuels. This warming has accelerated ice sheet melting, sea level rise, and extreme weather events. Scientists warn that exceeding 1.5°C will trigger irreversible tipping points. Governments have pledged emissions reductions under the Paris Agreement, though current commitments fall short of what is needed.",
          "response": "Global temperatures have risen 1.1°C above pre-industrial levels due to fossil fuel emissions, causing accelerating ice loss, sea level rise, and extreme weather. While governments have made Paris Agreement pledges, scientists warn current commitments are insufficient to prevent passing the critical 1.5°C threshold."}}

        Now generate a NEW, different data point fitting the required attributes.
        Return only a JSON object with keys "prompt" and "response". No explanation.

      sample.smollm2-1b7: >
        Generate a natural benchmark data point for the task {task_description} and produce a
        response {output_description}, where the response is specified with {target_attributes}.
        To make the datapoint naturalistic, use the following nuance parameters: {nuanced_attributes}.
        Return as JSON with exactly two keys: "prompt" and "response".


  # ════════════════════════════════════════════════════════════════════════════
  # Task 2: Code Explanation
  # 6 target attributes · 5 nuanced attributes · 6 rubric criteria
  # ════════════════════════════════════════════════════════════════════════════

  - name: code_explanation
    description: >
      Explain a given code snippet clearly for the specified audience and at
      the specified depth. The explanation must match the programming language,
      complexity level, and chosen explanation style.
    output_description: >
      A code explanation (80-200 words) that addresses what the code does,
      how it works, and (where depth requires) why it is structured that way.
      Technical depth and vocabulary must match the audience level.

    target_attributes:
      language:          [python, javascript, java, sql, bash]
      complexity:        [beginner, intermediate, advanced]
      explanation_style: [step_by_step, conceptual_overview, example_driven, annotated_walkthrough]
      audience:          [novice_programmer, junior_developer, senior_engineer, non_technical]
      snippet_type:      [function, class_definition, algorithm, database_query, shell_script]
      depth:             [surface, standard, deep_dive]

    nuanced_attributes:
      paradigm:           [functional, object_oriented, procedural, declarative]
      code_quality:       [clean_idiomatic, legacy_style, optimised, deliberately_buggy]
      use_case:           [web_backend, data_processing, system_administration, automation]
      documentation_level: [undocumented, partially_documented, well_documented]
      error_handling:     [no_error_handling, basic_try_catch, robust_validation]

    sampling:
      target: [1, 2]
      nuance: [1, 2]
      total: 20

    rubric:
      technical_accuracy:  "All statements about what the code does are factually correct."
      clarity:             "The explanation is clearly written and avoids unnecessary jargon for the audience level."
      appropriate_level:   "The depth and vocabulary precisely match the specified audience and depth level."
      completeness:        "The explanation covers all significant parts of the snippet without skipping key logic."
      practical_value:     "The explanation helps the reader understand when and how to use or avoid this pattern."
      structure:           "The explanation is logically ordered; ideas flow naturally from one to the next."

    evaluation_mode: single

    prompt_library:
      sample: |
        Generate a benchmark data point for: {task_description}
        Response format: {output_description}
        Required attributes: {target_attributes}. Nuance: {nuanced_attributes}.

        Follow this example format exactly:
        {{"prompt": "def fibonacci(n):\n    if n <= 1:\n        return n\n    return fibonacci(n-1) + fibonacci(n-2)",
          "response": "This Python function computes the nth Fibonacci number using recursion. When called with n, it returns n directly if n is 0 or 1 (the base cases). Otherwise, it calls itself twice — once with n-1 and once with n-2 — and adds the results. While elegant, this naive recursion recalculates the same values repeatedly, making it exponentially slow for large n."}}

        Now generate a NEW, different data point fitting the required attributes.
        Return only a JSON object with keys "prompt" and "response". No explanation.

      sample.smollm2-1b7: >
        Generate a natural benchmark data point for the task {task_description} and produce a
        response {output_description}, where the response is specified with {target_attributes}.
        To make the datapoint naturalistic, use the following nuance parameters: {nuanced_attributes}.
        Return as JSON with exactly two keys: "prompt" and "response".


  # ════════════════════════════════════════════════════════════════════════════
  # Task 3: Email Composition
  # 5 target attributes · 6 nuanced attributes · 5 rubric criteria
  # ════════════════════════════════════════════════════════════════════════════

  - name: email_composition
    description: >
      Write a professional email matching the specified purpose, tone, urgency,
      and length. The email must be appropriate for the described relationship
      and organisational context.
    output_description: >
      A complete email including Subject line, greeting, body (2-4 paragraphs
      for standard/detailed; 1 short paragraph for brief), and sign-off.
      Tone and formality must precisely match the specification.

    target_attributes:
      tone:     [formal, semi_formal, casual, assertive, empathetic]
      purpose:  [information_request, project_update, complaint_resolution, proposal, follow_up]
      urgency:  [low, medium, high, critical]
      length:   [brief, standard, detailed]
      formality: [peer_to_peer, manager_to_report, report_to_manager, external_client, executive]

    nuanced_attributes:
      industry:           [technology, finance, healthcare, education, manufacturing]
      relationship:       [established_colleague, new_contact, long_term_client, vendor, cross_team]
      subject_sensitivity: [routine, sensitive, politically_charged, confidential]
      cultural_context:   [western_professional, globally_neutral, regional_informal]
      sender_role:        [individual_contributor, team_lead, department_head, executive]
      communication_style: [direct, diplomatic, persuasive, collaborative]

    sampling:
      target: [1, 2]
      nuance: [1, 2]
      total: 20

    rubric:
      clarity:            "The email communicates its purpose unambiguously in the first paragraph."
      appropriate_tone:   "The tone and formality precisely match the specified relationship and context."
      completeness:       "All necessary information is included; nothing critical is omitted."
      professionalism:    "The email is free of grammatical errors and follows professional email conventions."
      actionability:      "Where a response or action is needed, the request is specific and easy to act on."

    evaluation_mode: single

    prompt_library:
      sample: |
        Generate a benchmark data point for: {task_description}
        Response format: {output_description}
        Required attributes: {target_attributes}. Nuance: {nuanced_attributes}.

        Follow this example format exactly:
        {{"prompt": "Write an email to your manager requesting approval to attend an industry conference next month. The conference costs $1,200 and is directly relevant to your current project.",
          "response": "Subject: Conference Attendance Request — TechSummit 2024\n\nDear Sarah,\n\nI would like to request approval to attend TechSummit 2024, scheduled for March 14-16 in Chicago. The conference programme includes sessions directly aligned with our Q2 platform migration project, particularly the track on distributed system architecture.\n\nThe registration fee is $1,200, with estimated travel and accommodation costs of $800, bringing the total to approximately $2,000. I believe the insights gained would accelerate our current timeline and reduce risk on the migration.\n\nPlease let me know if you need any additional information to support this request.\n\nBest regards,\nAlex"}}

        Now generate a NEW, different data point fitting the required attributes.
        Return only a JSON object with keys "prompt" and "response". No explanation.

      sample.smollm2-1b7: >
        Generate a natural benchmark data point for the task {task_description} and produce a
        response {output_description}, where the response is specified with {target_attributes}.
        To make the datapoint naturalistic, use the following nuance parameters: {nuanced_attributes}.
        Return as JSON with exactly two keys: "prompt" and "response".


  # ════════════════════════════════════════════════════════════════════════════
  # Task 4: Data Interpretation
  # 6 target attributes · 5 nuanced attributes · 6 rubric criteria
  # ════════════════════════════════════════════════════════════════════════════

  - name: data_interpretation
    description: >
      Interpret a described dataset or visualisation for the specified audience
      and domain. The interpretation must identify the key trend, explain its
      significance, and offer appropriate observations at the specified depth.
    output_description: >
      An interpretation (80-200 words) that identifies the primary trend,
      explains what it means in context, notes any notable anomalies or
      caveats, and concludes with an insight or implication for the audience.
      Statistical claims must be appropriate to the data complexity level.

    target_attributes:
      data_type:     [bar_chart, line_graph, scatter_plot, pivot_table, heatmap, histogram]
      insight_depth: [surface_observation, analytical_interpretation, predictive_inference]
      audience:      [executive, data_analyst, technical_specialist, general_public]
      domain:        [sales_revenue, public_health, climate, financial_markets, demographics]
      complexity:    [single_variable, bivariate_comparison, multivariate_statistical]
      trend_type:    [upward_growth, downward_decline, seasonal_cycle, flat_stable, anomalous_spike]

    nuanced_attributes:
      time_period:       [monthly, quarterly, annual, multi_year_longitudinal]
      comparison_type:   [year_over_year, benchmark_vs_target, regional_breakdown, before_after]
      data_quality:      [clean_complete, missing_values_noted, noisy_uncertain]
      presentation_context: [board_presentation, academic_publication, news_report, internal_dashboard]
      industry_context:  [retail, healthcare, government_policy, manufacturing, fintech]

    sampling:
      target: [1, 2]
      nuance: [1, 2]
      total: 20

    rubric:
      accuracy:             "All numerical claims and trend descriptions accurately reflect the described data."
      insight_quality:      "The interpretation goes beyond stating the obvious; it explains why the trend matters."
      statistical_literacy: "Statistical language is used correctly and proportionally to the data complexity."
      clarity:              "The interpretation is clearly structured: observation → explanation → implication."
      appropriate_caveats:  "Limitations in the data are acknowledged where relevant; claims are not overstated."
      actionability:        "The conclusion or implication is specific and useful for the stated audience."

    evaluation_mode: single

    prompt_library:
      sample: |
        Generate a benchmark data point for: {task_description}
        Response format: {output_description}
        Required attributes: {target_attributes}. Nuance: {nuanced_attributes}.

        Follow this example format exactly:
        {{"prompt": "The line graph shows monthly website visitors for an e-commerce platform from January to December 2023. Values were: Jan 45K, Feb 42K, Mar 48K, Apr 51K, May 55K, Jun 60K, Jul 58K, Aug 62K, Sep 70K, Oct 85K, Nov 120K, Dec 95K.",
          "response": "Website traffic grew steadily through 2023, rising approximately 33% from January to August, before accelerating sharply in Q4. The November spike to 120K visitors — a 71% jump from September — is consistent with Black Friday and holiday shopping behaviour and represents the single largest month-over-month gain. The December dip to 95K suggests post-holiday normalisation rather than sustained demand. The underlying Q1-Q3 growth trend points to healthy organic acquisition, making the Q4 peaks a multiplier on an already-improving baseline rather than a one-off anomaly."}}

        Now generate a NEW, different data point fitting the required attributes.
        Return only a JSON object with keys "prompt" and "response". No explanation.

      sample.smollm2-1b7: >
        Generate a natural benchmark data point for the task {task_description} and produce a
        response {output_description}, where the response is specified with {target_attributes}.
        To make the datapoint naturalistic, use the following nuance parameters: {nuanced_attributes}.
        Return as JSON with exactly two keys: "prompt" and "response".


# ─── EXPERIMENT ──────────────────────────────────────────────────────────────

experiment:
  id: medium-benchmark-v1
  storage_folder: ./Runs
  log_level: INFO

  # Retry failed datapoint generations up to this many times (default: 2).
  # Each retry re-samples attributes and re-prompts the teacher model.
  generation_retries: 2

  phases:
    attribute_mapping:   New
    rubric_mapping:      New
    data_generation:     New
    response_collection: New
    evaluation:          New

  # Conservative OpenAI quotas (total per model across all roles):
  #   Phase 3 as teacher: 4 tasks × 20 = 80
  #   Phase 4 as student: 4 × 20 × 5 teachers = 400
  #   Phase 5 as judge:   4 × 20 × 5 teachers × 5 students = 2000
  #   Per model total: 2,480 — set limit at 2,600 for safety
  quota:
    gpt-4o-mini:
      max_calls: 2600
    gpt-3.5-turbo:
      max_calls: 2600
